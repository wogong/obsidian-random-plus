name: Release

on:
    push:
        tags:
            - "[0-9]+.[0-9]+.[0-9]+"

permissions:
    contents: write
    id-token: write
    attestations: write
    artifact-metadata: write

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: "npm"

            - run: npm ci
            - run: npm run build
            - run: npm run lint

            - name: Verify release version
              run: node -e 'const manifest = require("./manifest.json"); if (manifest.version !== process.env.GITHUB_REF_NAME) { throw new Error("manifest version " + manifest.version + " does not match tag " + process.env.GITHUB_REF_NAME); }'

            - name: Generate artifact attestations
              uses: actions/attest@v4
              with:
                  subject-path: |
                      manifest.json
                      main.js
                      styles.css

            - name: Create GitHub release
              env:
                  GITHUB_TOKEN: ${{ github.token }}
              run: gh release create "$GITHUB_REF_NAME" manifest.json main.js styles.css --repo "$GITHUB_REPOSITORY" --title "$GITHUB_REF_NAME" --notes "Release $GITHUB_REF_NAME" --verify-tag
